<!DOCTYPE html>

<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Galeria</title>
</head>
<body>
    <h1>Galeria obrazków</h1>

    {% for image in images %}
        <div>
            <img src="{{ image.url }}" alt="{{ image.caption }}">
            <p>{{ image.caption }}</p>
        </div>
    {% endfor %}
</body>
</html>
