<!DOCTYPE html>

<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <h1>{{ page_title }}</h1>

    <ul>
        {% for movie in movies %}
            {% if loop.index % 2 == 0 %}
                <li style="background-color: lightgray;">{{ movie }}</li>
            {% else %}
                <li style="background-color: lightblue;">{{ movie }}</li>
            {% endif %}
        {% endfor %}
    </ul>
</body>
</html>
