<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Najnowsze posty</title>
</head>

<body>

    <h1>5 najnowszych postów</h1>

    <ul>
        {% for post in posts %}
            <li>
                <strong>{{ post.title }}</strong><br>
                {{ post.publication_date }}
            </li>
        {% empty %}
            <li>Brak postów.</li>
        {% endfor %}
    </ul>

</body>


</html>
