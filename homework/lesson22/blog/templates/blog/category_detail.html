{% load static %}

<!DOCTYPE html>

<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>{{ category.name }}</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>

<body>
    <h1>{{ category.name }}</h1>

    <h2>Artykuły w tej kategorii</h2>

    <ul>
        {% for article in category.article_set.all %}
            <li>{{ article.title }}</li>
        {% empty %}
            <li>Brak artykułów w tej kategorii.</li>
        {% endfor %}
    </ul>

    <a href="{% url 'category-list' %}">
        Powrót
    </a>
</body>

</html>
